[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*-json.log
    Tag               docker.raw
    Path_Key          docker_log_path

    multiline.parser  dotnet_console_docker

    DB                /var/lib/fluent-bit/state/docker-all.db
    DB.Sync           Normal

    Mem_Buf_Limit     50MB
    Buffer_Chunk_Size 256KB
    Buffer_Max_Size   5MB
    Skip_Long_Lines   On
    Refresh_Interval  5
    Rotate_Wait       30

    # add incremental log first
    Read_from_Head    Off